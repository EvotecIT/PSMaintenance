name: Test PowerShell

on:
  push:
    branches:
      - master
    paths-ignore:
      - '*.md'
      - 'Docs/**'
      - '.gitignore'
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  BUILD_CONFIGURATION: 'Debug'

jobs:
  test-windows-ps5:
    name: Windows PowerShell 5.1
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install PowerShell modules
        shell: powershell
        run: |
          Write-Host "PowerShell Version: $($PSVersionTable.PSVersion)"
          Install-Module -Name Pester -Repository PSGallery -Force -SkipPublisherCheck -AllowClobber

      - name: Build .NET project
        run: |
          dotnet restore PSMaintanance.sln
          dotnet build PSMaintenance/PSMaintenance.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore -warnaserror

      - name: Run PowerShell tests
        shell: powershell
        run: ./Module/PSMaintenance.Tests.ps1

  test-windows-ps7:
    name: Windows PowerShell 7
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Write-Host "PowerShell Version: $($PSVersionTable.PSVersion)"
          Install-Module -Name Pester -Repository PSGallery -Force -SkipPublisherCheck -AllowClobber

      - name: Build .NET project
        run: |
          dotnet restore PSMaintanance.sln
          dotnet build PSMaintenance/PSMaintenance.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore -warnaserror

      - name: Run PowerShell tests
        shell: pwsh
        run: ./Module/PSMaintenance.Tests.ps1
