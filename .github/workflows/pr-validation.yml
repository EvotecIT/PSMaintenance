name: PR Validation

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\PSMaintenance.Tests\PSMaintenance.Tests.csproj

      - name: Build module
        run: dotnet build .\PSMaintenance\PSMaintenance.csproj -c Release --no-restore

      - name: Test net8.0
        run: dotnet test .\PSMaintenance.Tests\PSMaintenance.Tests.csproj -c Release --framework net8.0 --no-restore
